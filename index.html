<script>
(function(){

],ci=-1,isPlaying=false;

var aCtx,anl,src,dArr,currentLyrics=[],currentLyricIdx=-1;

function initAC(){if(aCtx)return;try{aCtx=new(window.AudioContext||window.webkitAudioContext)();anl=aCtx.createAnalyser();src=aCtx.createMediaElementSource(ae);src.connect(anl);anl.connect(aCtx.destination);anl.fftSize=256;dArr=new Uint8Array(anl.frequencyBinCount)}catch(e){}}
function drawVz(){requestAnimationFrame(drawVz);if(!anl||!isPlaying){vx.clearRect(0,0,vz.width,vz.height);return}try{anl.getByteFrequencyData(dArr);var w=vz.width=vz.offsetWidth,h=vz.height=vz.offsetHeight;vx.clearRect(0,0,w,h);var bars=dArr.length,bw=(w/bars)*2.5,x=0;for(var i=0;i<bars;i++){var bh=(dArr[i]/255)*h*.5;var al=.3+(dArr[i]/255)*.7;vx.fillStyle='rgba(212,160,23,'+al+')';vx.fillRect(x,h/2-bh/2,bw,bh);x+=bw+1}}catch(e){}}
drawVz();
function exCov(f){return new Promise(function(r){if(typeof jsmediatags==='undefined'){r(null);return}jsmediatags.read(f,{onSuccess:function(t){var p=t.tags.picture;if(p){var b=new Uint8Array(p.data),bin='';for(var i=0;i<b.length;i++)bin+=String.fromCharCode(b[i]);r('data:'+p.format+';base64,'+window.btoa(bin))}else r(null)},onError:function(){r(null)}})})}
function showAA(u){if(u){aa.src=u;aa.classList.add('vis');tf.classList.add('hid')}else{aa.classList.remove('vis');aa.src='';tf.classList.remove('hid')}}
function fmtT(s){if(isNaN(s)||!isFinite(s))return'0:00';var m=Math.floor(s/60),sc=Math.floor(s%60);return m+':'+String(sc).padStart(2,'0')}

function parseLRC(t){if(!t)return[];var lines=t.split('\n'),r=[],reg=/\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/;for(var i=0;i<lines.length;i++){var m=lines[i].match(reg);if(m){var s=parseInt(m[1])*60+parseInt(m[2])+parseInt(m[3])/(m[3].length===2?100:1000);var txt=m[4].trim();if(txt)r.push({t:s,s:txt})}}return r.sort(function(a,b){return a.t-b.t})}

function renderLyrics(ly){currentLyrics=ly||[];currentLyricIdx=-1;lyScroll.innerHTML='';if(!currentLyrics.length){lyScroll.innerHTML='<div class="lyric-placeholder">暂无歌词<br><span style="font-size:.75rem;opacity:.5">搜索歌曲自动获取歌词</span></div>';return}currentLyrics.forEach(function(l){var d=document.createElement('div');d.className='lyric-line';d.textContent=l.s;d.onclick=function(){if(l.t>=0){ae.currentTime=l.t;if(!isPlaying){playAudio()}}};lyScroll.appendChild(d)})}

function updateLyricScroll(){if(!currentLyrics.length)return;var ct=ae.currentTime,idx=-1;for(var i=currentLyrics.length-1;i>=0;i--){if(ct>=currentLyrics[i].t){idx=i;break}}if(idx===currentLyricIdx)return;currentLyricIdx=idx;var lines=lyScroll.querySelectorAll('.lyric-line');lines.forEach(function(el,i){el.className='lyric-line';if(i===idx)el.classList.add('current');else if(Math.abs(i-idx)===1)el.classList.add(i<idx?'prev':'next');else if(Math.abs(i-idx)>1)el.classList.add('dim')});if(idx>=0&&lines[idx]){var wrapH=lyScroll.parentElement.offsetHeight;var scrollTarget=-(lines[idx].offsetTop-wrapH/2+lines[idx].offsetHeight/2);lyScroll.style.transform='translateY('+scrollTarget+'px)'}lyTime.textContent=fmtT(ct)+' / '+fmtT(ae.duration||0)}

// 播放控制 - 修复逻辑
function playAudio(){if(ci===-1||!tracks[ci])return;ae.play().then(function(){initAC();isPlaying=true;updPlayBtn();vb.classList.add('playing');em.style.display='none'}).catch(function(e){console.error('播放失败:',e);em.style.display='block';em.textContent='播放失败: '+e.message+' (点击播放按钮重试)'})}

function pauseAudio(){ae.pause();isPlaying=false;updPlayBtn();vb.classList.remove('playing')}

function togglePlay(){
  if(ci===-1){if(tracks.length>0){playTrk(0)}return}
  if(isPlaying){pauseAudio()}else{playAudio()}
}

function updPlayBtn(){bpl.innerHTML=isPlaying?'&#9646;&#9646;':'&#9654;'}

// Meting API 基础地址
var METING='https://meting.mikus.ink/api';

// 音乐搜索（使用Meting API，自带CORS支持）
function searchMusic(kw){
  if(!kw.trim()){srp.classList.remove('show');return}
  srp.innerHTML='<div class="srl">搜索中...</div>';srp.classList.add('show');
  
  fetch(METING+'?server=netease&type=search&id='+encodeURIComponent(kw))
  .then(function(r){return r.json()})
  .then(function(data){
    if(!data||!data.length){
      srp.innerHTML='<div class="srl">未找到相关歌曲</div>';return}
    srp.innerHTML='';
    data.forEach(function(song){
      var d=document.createElement('div');d.className='sri';
      var picUrl=song.pic||'';
      var sn=(song.title||'').replace(/</g,'&lt;');
      var ar=(song.author||'').replace(/</g,'&lt;');
      d.innerHTML='<div class="srt">'+(picUrl?'<img src="'+picUrl+'" alt="">':'<div style="width:100%;height:100%;background:linear-gradient(135deg,#8B1A1A,#1E4D8C);display:flex;align-items:center;justify-content:center;font-size:14px;color:#D4A017">&#9835;</div>')+'</div><div class="srinf"><h4>'+sn+'</h4><p>'+ar+'</p></div><button class="srp2" title="播放">&#9654;</button>';
      d.onclick=function(){playSong(song)};srp.appendChild(d);
    });
  })
  .catch(function(e){srp.innerHTML='<div class="srl">搜索出错: '+e.message+'</div>'});
}

// 播放歌曲 - 用fetch下载音频为blob播放
function playSong(song){
  var playUrl=song.url||'';
  if(!playUrl){alert('无播放地址');return}
  
  var track={
    title:song.title||'未知歌曲',
    artist:song.author||'未知歌手',
    cat:'online',
    dur:'--:--',
    color:'#1E4D8C',
    url:'',
    blobUrl:'',
    coverUrl:song.pic||'',
    src:'netease',
    lyrics:[]
  };
  
  tracks.push(track);
  srp.classList.remove('show');
  filtTracks();
  
  // 先设置歌曲信息
  ci=tracks.length-1;
  tt.textContent=track.title;ta.textContent=track.artist;
  vb.style.background='linear-gradient(135deg,'+track.color+',var(--tb))';
  showAA(track.coverUrl||null);
  em.style.display='none';
  renderL();
  
  // 用fetch下载音频blob
  em.style.display='block';em.textContent='正在加载音频...';
  fetch(playUrl).then(function(r){return r.blob()}).then(function(blob){
    var blobUrl=URL.createObjectURL(blob);
    track.blobUrl=blobUrl;
    track.url=blobUrl;
    em.style.display='none';
    ae.src=blobUrl;
    ae.load();
    setTimeout(function(){playAudio()},100);
    
    // 获取歌词
    if(song.lrc){
      fetch(song.lrc).then(function(r){return r.text()}).then(function(txt){
        var ly=parseLRC(txt);
        if(ly.length>0){
          track.lyrics=ly;
          if(tracks.indexOf(track)===ci)renderLyrics(ly);
          lySource.textContent='歌词来源: 网易云音乐';
        }
      }).catch(function(){});
    }
  }).catch(function(e){
    em.style.display='block';em.textContent='加载失败: '+e.message;
  });
}

// 获取歌词（备用方法）
async function fetchLyrics(songId){
  try{
    var resp=await fetch(METING+'?server=netease&type=lrc&id='+songId);
    var txt=await resp.text();
    if(txt){return parseLRC(txt)}
  }catch(e){console.error('获取歌词失败:',e)}
  return[];
}

function renderL(){pl.innerHTML='';eh.style.display=tracks.length===0?'block':'none';plCount.textContent=tracks.length;
filt.forEach(function(t){
  var ri=tracks.indexOf(t),li=document.createElement('li');li.className='ti2'+(ri===ci?' ac3':'');
  var th=t.coverUrl?'<img src="'+t.coverUrl+'" onerror="this.style.display=\'none\'" alt="">':'<div class="tp">&#9835;</div>';
  li.innerHTML='<div class="tt">'+th+'</div><span class="tn">'+(ri+1)+'</span><div class="td2"><h4>'+t.title.replace(/</g,'&lt;')+'</h4><p>'+t.artist.replace(/</g,'&lt;')+'</p></div><span class="tl">'+t.dur+'</span><button class="trm" title="移除" data-i="'+ri+'">&times;</button>';
  li.onclick=function(e){if(e.target.closest('.trm')){e.stopPropagation();rmTrk(parseInt(e.target.closest('.trm').dataset.i));return}playTrk(ri)};
  pl.appendChild(li)});
stt.textContent=tracks.length;sto.textContent=tracks.filter(function(t){return t.src==='netease'}).length}

function rmTrk(i){if(i<0||i>=tracks.length)return;if(i===ci){pauseAudio();ae.src='';ci=-1;tt.textContent='请选择一首歌曲';ta.textContent='雪域之声 · 音乐';showAA(null);renderLyrics([]);lyTime.textContent='';lySource.textContent=''}else if(i<ci)ci--;tracks.splice(i,1);filtTracks()}

// 预加载缓存
var preloadCache={};

function preloadSong(idx){
  if(idx<0||idx>=tracks.length)return;
  var t=tracks[idx];
  if(!t.url||preloadCache[idx]||t.src==='netease')return;
  fetch(t.url).then(function(r){return r.blob()}).then(function(blob){
    preloadCache[idx]=URL.createObjectURL(blob);
  }).catch(function(){});
}

function playTrk(idx){
  if(idx<0||idx>=tracks.length)return;
  ci=idx;var t=tracks[idx];
  tt.textContent=t.title;ta.textContent=t.artist;
  vb.style.background='linear-gradient(135deg,'+t.color+',var(--tb))';
  showAA(t.coverUrl||null);
  if(t.url){
    em.style.display='block';em.textContent='正在加载...';
    var loadUrl=preloadCache[idx]||t.url;
    ae.src=loadUrl;
    ae.load();
    ae.oncanplay=function(){
      em.style.display='none';
      ae.oncanplay=null;
      playAudio();
      // 预加载下一首
      preloadSong((idx+1)%tracks.length);
    };
    ae.onerror=function(){
      if(preloadCache[idx]){
        // 预加载的blob失败，尝试原始URL
        delete preloadCache[idx];
        ae.src=t.url;ae.load();
      }else{
        em.style.display='block';em.textContent='加载失败，正在重试...';
        setTimeout(function(){playTrk(idx)},1000);
      }
    };
  }else{
    em.style.display='block';em.textContent='此歌曲暂无音频';return;
  }
  renderLyrics(t.lyrics&&t.lyrics.length?t.lyrics:[]);
  lySource.textContent=t.lyrics&&t.lyrics.length?'歌词来源: 网易云音乐':'暂无歌词';
  renderL();
}

function playNext(){if(!tracks.length)return;var i=(ci+1)%tracks.length;playTrk(i)}
function playPrev(){if(!tracks.length)return;var i=ci-1;if(i<0)i=tracks.length-1;playTrk(i)}

bpl.onclick=togglePlay;
bn.onclick=playNext;
bp.onclick=playPrev;

ae.ontimeupdate=function(){if(!ae.duration)return;pf.style.width=(ae.currentTime/ae.duration*100)+'%';tn.textContent=fmtT(ae.currentTime);td.textContent=fmtT(ae.duration);updateLyricScroll()};
ae.onended=function(){playNext()};
ae.onerror=function(){em.style.display='block';em.textContent='音频加载失败，可能受版权限制';pauseAudio()};

ls.oninput=function(){filtTracks()};
tg.onclick=function(e){if(!e.target.classList.contains('tg3'))return;document.querySelectorAll('.tg3').forEach(function(t){t.classList.remove('ac4')});e.target.classList.add('ac4');var cat=e.target.dataset.c;filtTracks()};
function filtTracks(){var q2=ls.value.toLowerCase();filt=tracks.filter(function(t){var mc=!tg.querySelector('.ac4')||tg.querySelector('.ac4').dataset.c==='all'||t.cat===tg.querySelector('.ac4').dataset.c;var mq=t.title.toLowerCase().indexOf(q2)>=0||t.artist.toLowerCase().indexOf(q2)>=0;return mc&&mq});renderL()}

sbn.onclick=function(){searchMusic(ks.value)};
ks.onkeydown=function(e){if(e.key==='Enter')searchMusic(ks.value)};
var sT=null;ks.oninput=function(){clearTimeout(sT);sT=setTimeout(function(){searchMusic(ks.value)},500)};
document.addEventListener('click',function(e){if(!e.target.closest('.sb'))srp.classList.remove('show')});
plToggle.onclick=function(){plBody.classList.toggle('open');plToggle.innerHTML=(plBody.classList.contains('open')?'&#9660;':'&#9654;')+' 播放列表 <span id="plCount">'+tracks.length+'</span> 首'};

ua.onclick=function(){fi.click()};
fi.onchange=function(e){handleFiles(e.target.files)};
ua.ondragover=function(e){e.preventDefault();ua.style.borderColor='var(--tg)'};
ua.ondragleave=function(){ua.style.borderColor=''};
ua.ondrop=function(e){e.preventDefault();ua.style.borderColor='';handleFiles(e.dataTransfer.files)};
async function handleFiles(files){
for(var i=0;i<files.length;i++){
var f=files[i];if(!f.type.startsWith('audio/'))continue;
var url=URL.createObjectURL(f),name=f.name.replace(/\.[^.]+$/,'');
var cov=null;try{cov=await exCov(f)}catch(e){cov=null}
tracks.push({title:name,artist:'本地文件',cat:'local',dur:'--:--',color:'#336699',url:url,coverUrl:cov,src:'local',lyrics:[]})}
filtTracks();em.style.display='none'}

dq.textContent=q[Math.floor(Math.random()*q.length)];renderLyrics([]);filtTracks();
// 预加载前3首
for(var pi=0;pi<Math.min(3,tracks.length);pi++)preloadSong(pi);
document.onkeydown=function(e){if(e.target.tagName==='INPUT')return;if(e.code==='Space'){e.preventDefault();togglePlay()}if(e.code==='ArrowRight')playNext();if(e.code==='ArrowLeft')playPrev()};

// 天气获取 - 浏览器定位获取本地天气
function loadWeather(){
  var wbTemp=document.getElementById('wbTemp'),wbDesc=document.getElementById('wbDesc');
  var wbWind=document.getElementById('wbWind'),wbHum=document.getElementById('wbHum'),wbIcon=document.querySelector('.wb-icon');
  var enToZh={'Sunny':'晴','Clear':'晴','Partly cloudy':'多云','Cloudy':'多云','Overcast':'阴','Mist':'薄雾','Fog':'雾','Light rain':'小雨','Moderate rain':'中雨','Heavy rain':'大雨','Light drizzle':'小雨','Patchy rain possible':'可能有阵雨','Patchy rain nearby':'附近阵雨','Thundery outbreaks possible':'可能雷阵雨','Light snow':'小雪','Moderate snow':'中雪','Heavy snow':'大雪','Blizzard':'暴雪','Patchy snow possible':'可能有小雪','Patchy sleet possible':'可能有雨夹雪','Light rain shower':'阵雨','Moderate or heavy rain shower':'大阵雨','Torrential rain shower':'暴雨','Light sleet':'雨夹雪','Moderate or heavy sleet':'大雨夹雪','Freezing fog':'冻雾','Patchy light drizzle':'零星小雨','Patchy light rain':'零星小雨','Patchy light snow':'零星小雪','Moderate or heavy snow with thunder':'雷大雪','Ice pellets':'冰粒'};
  var weatherIcons={'晴':'☀️','多云':'⛅','阴':'☁️','小雨':'🌦️','中雨':'🌧️','大雨':'🌧️','暴雨':'⛈️','雷阵雨':'⛈️','小雪':'🌨️','中雪':'❄️','大雪':'❄️','暴雪':'❄️','雾':'🌫️','薄雾':'🌫️','冻雾':'🌫️','阵雨':'🌦️','雨夹雪':'🌨️','冰粒':'🧊'};
  function renderWeather(d){
    var cur=d.current_condition[0];
    var temp=cur.temp_C||'--';
    var rawDesc=cur.weatherDesc[0].value||'';
    var desc=enToZh[rawDesc]||rawDesc;
    var wind=cur.windspeedKmph||'--';
    var hum=cur.humidity||'--';
    wbTemp.textContent=temp+'°';
    wbDesc.textContent=desc;
    wbWind.textContent='💨 '+wind+'km/h';
    wbHum.textContent='💧 '+hum+'%';
    wbIcon.textContent=weatherIcons[desc]||'🏔️';
  }
  function fetchByCoords(lat,lon){
    fetch('https://wttr.in/'+lat+','+lon+'?format=j1')
    .then(function(r){return r.json()}).then(renderWeather)
    .catch(function(){wbDesc.textContent='天气获取失败'});
  }
  // 浏览器定位
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){fetchByCoords(pos.coords.latitude,pos.coords.longitude)},
      function(){fetchByCoords('29.65','91.10')},
      {timeout:8000}
    );
  }else{
    fetchByCoords('29.65','91.10');
  }
}
loadWeather();
})();
